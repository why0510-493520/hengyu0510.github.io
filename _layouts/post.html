---
layout: default
---

<main class="main-content">
  <article>
    <header class="post-header">
      <h1 class="post-title">{{ page.title }}</h1>
      <div class="post-meta">
        <time datetime="{{ page.date | date: '%Y-%m-%d' }}">{{ page.date | date: '%Y年%-m月%-d日' }}</time>
      </div>
    </header>

    <div class="post-content">
      {{ content }}
    </div>
  </article>

  <nav class="post-nav">
    <a href="{{ '/' | relative_url }}" class="post-nav-link">&larr; 返回首页</a>
  </nav>
</main>
